apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3
  awsElasticBlockStore:
    volumeID: vol-0d8c8e9e9e9e9e9e  # This will be auto-created
    fsType: ext4

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3
  awsElasticBlockStore:
    volumeID: vol-0d8c8e9e9e9e9e9f
    fsType: ext4