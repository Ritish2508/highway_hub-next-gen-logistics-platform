apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: highwayhub
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: riti250/highwayhub-backend-beta:v1
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "development"
            - name: MONGO_URI
              value: "mongodb://highwayhub_user:HighwayHub123@mongodb-service:27017/highwayhub?authSource=admin"
            - name: JWT_SECRET
              value: "CHANGE_THIS_SECRET"
            - name: CLIENT_URL
              value: "http://<WORKER_PUBLIC_IP>:31000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: highwayhub
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      nodePort: 31100