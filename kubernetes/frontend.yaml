apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: highwayhub
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: riti250/highwayhub-frontend-beta:v1
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: "http://<WORKER_PUBLIC_IP>:31100/api/v1"
            - name: VITE_SOCKET_URL
              value: "http://<WORKER_PUBLIC_IP>:31100"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: highwayhub
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP
      nodePort: 31000